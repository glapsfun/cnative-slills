config:
  default: true
  MD013: false # line length: prose is wrapped by author preference
  MD033: false # inline HTML is allowed in skill docs
  MD041: false # first line need not be a top-level heading
  MD060: false # table-column-style: overly aggressive alignment rule
  MD040: false # code fences often show plain terminal output, no language
  MD024: false # duplicate headings are common across skill reference sections
  MD036: false # emphasis used as lightweight sub-headings in skill docs
  MD025: false # some docs intentionally use multiple top-level headings
globs:
  - "**/*.md"
ignores:
  - "**/node_modules/**"
  # Internal workflow artifacts (brainstorm specs, implementation plans). These
  # embed nested code fences that do not lint cleanly and are not shipped docs.
  - "docs/superpowers/**"
